<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="escudoFundo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#15397a"/>
      <stop offset="100%" stop-color="#0a1f3d"/>
    </linearGradient>
  </defs>

  <!-- Corpo do escudo -->
  <path d="M32 3
           L56 11
           V29
           C56 45 46 56 32 61
           C18 56 8 45 8 29
           V11
           Z"
