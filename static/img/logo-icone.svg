  <!-- Balança da justiça estilizada (haste + pratos), em dourado -->
  <g stroke="#d9c98a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <line x1="32" y1="18" x2="32" y2="40"/>
    <line x1="21" y1="24" x2="43" y2="24"/>
    <path d="M21 24 L17 32 a4.4 4.4 0 0 0 8 0 Z"/>
    <path d="M43 24 L39 32 a4.4 4.4 0 0 0 8 0 Z"/>
    <line x1="26" y1="41" x2="38" y2="41"/>
  </g>

  <!-- Check de verificação, canto inferior direito -->
  <circle cx="46" cy="42" r="11" fill="#0f9d63" stroke="#0a1f3d" stroke-width="2"/>
  <path d="M41 42 L44.5 45.5 L51.5 38.5" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
